name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build clean URLs
        run: |
          cp -R src _site
          mkdir -p _site/jp _site/projects _site/projects-jp _site/resume _site/resume-jp
          cp src/index-jp.html _site/jp/index.html
          cp src/projects.html _site/projects/index.html
          cp src/projects-jp.html _site/projects-jp/index.html
          cp src/resume.html _site/resume/index.html
          cp src/resume-jp.html _site/resume-jp/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
